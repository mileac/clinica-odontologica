{% extends "base.html" %}

{% block title %}Editar Tratamento{% endblock %}
{% block header_title %}Editar Tratamento{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-pencil"></i> Editar Tratamento</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Data *</label>
                    <input type="date" class="form-control" name="data"
                           value="{{ tratamento.data }}" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Dente</label>
                    <input type="text" class="form-control" name="dente"
                           value="{{ tratamento.dente or '' }}" placeholder="Ex: 11">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Procedimento *</label>
                    <input type="text" class="form-control" name="procedimento"
                           value="{{ tratamento.procedimento }}" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Valor (R$) *</label>
                    <input type="number" step="0.01" class="form-control" name="valor"
                           value="{{ tratamento.valor }}" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Valor Pago (R$)</label>
                    <input type="number" step="0.01" class="form-control" name="valor_pago"
                           value="{{ tratamento.valor_pago }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-8 mb-3">
                    <label class="form-label">Descricao</label>
                    <textarea class="form-control" name="descricao" rows="2">{{ tratamento.descricao or '' }}</textarea>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Forma de Pagamento</label>
                    <select class="form-select" name="forma_pagamento">
                        <option value="">Selecione...</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartao de Credito">Cartao de Credito</option>
                        <option value="Cartao de Debito">Cartao de Debito</option>
                        <option value="PIX">PIX</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Observacoes</label>
                <textarea class="form-control" name="observacoes" rows="1">{{ tratamento.observacoes or '' }}</textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Salvar Alteracoes
                </button>
                <a href="/ficha-tratamento/{{ tratamento.paciente_id }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Cadastrar Paciente - {{ config.nome_clinica }}{% endblock %}
{% block header_title %}Cadastrar Novo Paciente{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-person-plus"></i> Dados do Paciente</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="nome" class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" name="nome" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="cpf" class="form-label">CPF *</label>
                    <input type="text" class="form-control cpf-mask" id="cpf" name="cpf" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="data_nascimento" class="form-label">Data de Nascimento *</label>
                    <input type="date" class="form-control" id="data_nascimento" name="data_nascimento" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="celular" class="form-label">Celular</label>
                    <input type="text" class="form-control celular-mask" id="celular" name="celular">
                </div>

                <div class="col-md-4 mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
            </div>

            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço</label>
                <input type="text" class="form-control" id="endereco" name="endereco">
            </div>

            <div class="mb-3">
                <label for="observacoes" class="form-label">Observações</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Cadastrar Paciente
            </button>
            <a href="{{ url_for('listar_pacientes') }}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}

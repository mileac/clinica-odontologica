{% extends "base.html" %}
{% block title %}Editar Funcionario{% endblock %}
{% block header_title %}Editar: {{ funcionario.nome_completo }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-pencil"></i> Editar Funcionario</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome_completo" value="{{ funcionario.nome_completo }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Usuario (login)</label>
                    <input type="text" class="form-control" value="{{ funcionario.username }}" readonly>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Nova Senha</label>
                    <input type="password" class="form-control" name="password" placeholder="Deixe em branco">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cargo *</label>
                    <select class="form-select" name="cargo" required>
                        <option value="Admin">Admin - Acesso Total</option>
                        <option value="Dentista">Dentista - Acesso Clinico</option>
                        <option value="Secretaria">Secretaria - Acesso Administrativo</option>
                        <option value="Auxiliar">Auxiliar - Acesso Basico</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Comissao (%)</label>
                    <input type="number" step="0.1" class="form-control" name="comissao_percentual" value="{{ funcionario.comissao_percentual }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email" value="{{ funcionario.email or '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">CRO</label>
                    <input type="text" class="form-control" name="cro" value="{{ funcionario.cro or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Especialidade</label>
                    <input type="text" class="form-control" name="especialidade" value="{{ funcionario.especialidade or '' }}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Salvar
            </button>
            <a href="/funcionarios" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}

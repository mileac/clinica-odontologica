{% extends "base.html" %}
{% block title %}Cadastrar Funcionário{% endblock %}
{% block header_title %}Novo Funcionário{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-person-plus"></i> Cadastrar Funcionário</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome_completo" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Usuário (login) *</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Senha *</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cargo (nível de acesso) *</label>
                    <select class="form-select" name="cargo" required onchange="mostrarInfoCargo(this.value)">
                        <option value="">Selecione o cargo...</option>
                        <option value="Admin">Administrador - Acesso Total</option>
                        <option value="Dentista">Dentista - Acesso Clínico</option>
                        <option value="Secretaria">Secretária - Acesso Administrativo</option>
                        <option value="Auxiliar">Auxiliar - Acesso Básico</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Comissão (%)</label>
                    <input type="number" step="0.1" class="form-control" name="comissao_percentual" value="0">
                    <small class="text-muted">Apenas para Dentistas</small>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email">
                </div>
            </div>

            <div class="row" id="camposDentista">
                <div class="col-md-6 mb-3">
                    <label class="form-label">CRO</label>
                    <input type="text" class="form-control" name="cro" placeholder="CRO-SP 00000">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Especialidade</label>
                    <input type="text" class="form-control" name="especialidade" placeholder="Ex: Ortodontia">
                </div>
            </div>

            <!-- Info do cargo -->
            <div class="alert alert-info" id="infoCargo" style="display:none;">
                <h6><i class="bi bi-info-circle"></i> <span id="infoCargoTitulo"></span></h6>
                <p class="mb-0" id="infoCargoDescricao"></p>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Cadastrar
                </button>
                <a href="{{ url_for('listar_funcionarios') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function mostrarInfoCargo(cargo) {
    const info = document.getElementById('infoCargo');
    const titulo = document.getElementById('infoCargoTitulo');
    const descricao = document.getElementById('infoCargoDescricao');
    const camposDentista = document.getElementById('camposDentista');

    const permissoes = {
        'Admin': {
            titulo: 'Administrador - Acesso Total',
            descricao: 'Pode acessar TODAS as áreas: pacientes, financeiro, configurações, funcionários, relatórios, comissões. Pode criar, editar e excluir qualquer registro.'
        },
        'Dentista': {
            titulo: 'Dentista - Acesso Clínico',
            descricao: 'Acesso a pacientes, fichas clínicas, ortodontia, tratamentos, odontograma, orçamentos, agenda, atestados, histórico. NÃO vê financeiro, configurações, nem dados de outros profissionais.'
        },
        'Secretaria': {
            titulo: 'Secretária - Acesso Administrativo',
            descricao: 'Acesso a pacientes, ficha clínica, agenda, atestados, aniversariantes. Pode editar cadastro de pacientes. NÃO vê tratamentos, financeiro, configurações.'
        },
        'Auxiliar': {
            titulo: 'Auxiliar - Acesso Básico',
            descricao: 'Acesso ao dashboard, lista de pacientes e agenda. NÃO pode editar, excluir ou ver informações financeiras.'
        }
    };

    if (cargo && permissoes[cargo]) {
        info.style.display = 'block';
        titulo.textContent = permissoes[cargo].titulo;
        descricao.textContent = permissoes[cargo].descricao;
    } else {
        info.style.display = 'none';
    }

    // Mostrar campos de dentista apenas para dentista
    camposDentista.style.display = (cargo === 'Dentista') ? 'flex' : 'none';
}
</script>
{% endblock %}
